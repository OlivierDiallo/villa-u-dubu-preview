<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Villa U Dubu — aperçus</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#10131c;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
  .wrap{max-width:760px;width:100%;text-align:center}
  h1{font-family:Georgia,serif;font-weight:500;font-size:clamp(30px,5vw,52px);letter-spacing:.04em;margin-bottom:10px}
  p.sub{opacity:.6;letter-spacing:.04em;margin-bottom:48px;font-size:14px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
  a.card{display:block;text-decoration:none;color:#fff;padding:38px 26px;border:1px solid rgba(255,255,255,.16);transition:transform .25s,border-color .25s,background .25s}
  a.card:hover{transform:translateY(-3px)}
  a.nuit:hover{border-color:#b8952a;background:rgba(184,149,42,.08)}
  a.pierre:hover{border-color:#8a8550;background:rgba(138,133,80,.08)}
  .sw{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
  .sw i{width:16px;height:16px;display:block}
  .name{font-family:Georgia,serif;font-size:24px;margin-bottom:6px}
  .desc{font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
  footer{margin-top:46px;font-size:11.5px;opacity:.4;letter-spacing:.08em}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Villa U Dubu</h1>
    <p class="sub">Aperçu privé — deux ambiances · présenté par ALTAM</p>
    <div class="cards">
      <a class="card nuit" href="nuit/">
        <div class="sw"><i style="background:#1a2744"></i><i style="background:#b8952a"></i></div>
        <div class="name">Nuit</div>
        <div class="desc">Marine &amp; or</div>
      </a>
      <a class="card pierre" href="pierre/">
        <div class="sw"><i style="background:#3d3930"></i><i style="background:#8a8550"></i></div>
        <div class="name">Pierre</div>
        <div class="desc">Pierre &amp; olive</div>
      </a>
    </div>
    <footer>Aperçu privé, contenu provisoire — © 2026 ALTAM</footer>
  </div>
</body>
</html>
